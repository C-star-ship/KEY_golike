<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIP KEY GENERATOR</title>

<style>

body{
background:black;
color:#0f0;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{

background:#000;
padding:40px;

border:2px solid #0f0;
border-radius:15px;

box-shadow:0 0 25px #0f0;

text-align:center;

width:90%;
max-width:420px;

}

h2{
margin-bottom:25px;
}

input{

width:100%;
padding:12px;

background:#111;
border:1px solid #0f0;

color:#0f0;

margin-bottom:15px;

}

button{

width:100%;
padding:14px;

background:#0f0;
border:none;

font-weight:bold;
cursor:pointer;

margin-top:10px;

}

.result{

margin-top:20px;
font-size:16px;

color:#0ff;

word-break:break-all;

}

</style>

</head>

<body>

<div class="box">

<h2>VIP KEY GENERATOR</h2>

<input id="days" placeholder="Nhập số ngày (ví dụ 7)">

<button onclick="createKey()">CREATE KEY</button>

<div class="result" id="result"></div>

</div>

<script>

function random(n){

const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"

let s=""

for(let i=0;i<n;i++){

s+=chars[Math.floor(Math.random()*chars.length)]

}

return s

}

function createKey(){

let days=parseInt(document.getElementById("days").value)

if(!days){

alert("Nhập số ngày")

return

}

let expire=Date.now()+days*86400000

let key="VIP-"+random(10)+"-"+expire

document.getElementById("result").innerText=
"day = "+days+"\n\nkey = "+key

}

</script>

</body>
</html>
