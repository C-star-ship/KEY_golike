<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIP KEY</title>

<style>

body{
background:black;
color:#0f0;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{

background:#000;
padding:40px;

border:2px solid #0f0;
border-radius:15px;

box-shadow:
0 0 25px #0f0,
0 0 80px #0f0;

text-align:center;

width:90%;
max-width:420px;

}

.result{

margin-top:20px;
color:#0ff;
font-size:18px;

word-break:break-all;

}

</style>

</head>

<body>

<div class="box">

<h2>VIP KEY</h2>

<div class="result" id="result"></div>

</div>

<script>

/* random string */

function random(len){

const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"

let s=""

for(let i=0;i<len;i++){

s+=chars[Math.floor(Math.random()*chars.length)]

}

return s

}

/* đọc day */

const params=new URLSearchParams(window.location.search)

let day=parseInt(params.get("day"))

if(!day){

document.getElementById("result").innerText="Thiếu day"

}else{

let expire=Date.now()+day*86400000

let key="VIP-"+random(8)+"-"+expire

document.getElementById("result").innerText=

"day = "+day+"\n\nkey = "+key

}

</script>

</body>
</html>
