<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CHECK KEY</title>

<style>

body{
background:black;
color:#00ff9f;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#000;
padding:40px;
border-radius:15px;
border:2px solid #00ff9f;

box-shadow:
0 0 20px #00ff9f,
0 0 60px #00ff9f;

text-align:center;
width:90%;
max-width:420px;
}

.title{
font-size:26px;
margin-bottom:20px;
}

.result{
font-size:18px;
word-break:break-all;
}

</style>

</head>

<body>

<div class="box">

<div class="title">CHECK KEY</div>

<div class="result" id="result">
CHECKING...
</div>

</div>

<script>

const params = new URLSearchParams(location.search)
const key = params.get("key")

const result = document.getElementById("result")

if(!key){

result.innerText="INVALID"

}else{

let parts = key.split("-")

if(parts.length < 3){

result.innerText="INVALID"

}else{

let expire = parseInt(parts[parts.length-1])

let now = Date.now()

if(now > expire){

result.innerText="EXPIRED"

}else{

result.innerText="VALID"

}

}

}

</script>

</body>
</html>
